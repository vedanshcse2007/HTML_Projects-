<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<link rel="stylesheet" href="Wstyle.css">

</head>

<body>

<div class="container">

<h1>🌤 Weather Dashboard</h1>

<div class="search-box">

<input
type="text"
id="cityInput"
placeholder="Enter City Name">

<button id="searchBtn">
Search
</button>

</div>

<div id="loading" class="loading">
Loading...
</div>

<div id="error" class="error"></div>

<div class="weather-card" id="weatherCard">

<h2 id="cityName"></h2>

<img id="weatherIcon">

<h3 id="temperature"></h3>

<p id="description"></p>

<div class="weather-grid">

<div class="card">
Humidity
<h3 id="humidity"></h3>
</div>

<div class="card">
Wind
<h3 id="wind"></h3>
</div>

<div class="card">
Pressure
<h3 id="pressure"></h3>
</div>

<div class="card">
Feels Like
<h3 id="feelsLike"></h3>
</div>

<div class="card">
Visibility
<h3 id="visibility"></h3>
</div>

<div class="card">
Country
<h3 id="country"></h3>
</div>

<div class="card">
Sunrise
<h3 id="sunrise"></h3>
</div>

<div class="card">
Sunset
<h3 id="sunset"></h3>
</div>

</div>

<p id="updated"></p>

</div>

</div>

<script src="Wscript.js"></script>

</body>
</html>
